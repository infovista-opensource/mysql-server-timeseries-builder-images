name: Builder docker image for mysql-server-timeseries
  
on:
  # Triggers the pipeline when pushing a new tag
  workflow_dispatch:
  push:
    tags:
      - '**'
       
env:
  REGISTRY: ghcr.io
  REPOSITORY_NAME: ${{ github.repository }}
  
jobs:

  build-and-push-image:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry ghcr.io
        uses: docker/login-action@v3
        with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for OL8
        id: push-OL8
        uses: docker/build-push-action@v5
        with:
          context: ./mysql8-build-lnx8
          file: ./mysql8-build-lnx8/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY_NAME }}/mysql8-build-lnx8:${{ github.ref_name }}

      - name: Build and push Docker image for OL9
        id: push-OL9
        uses: docker/build-push-action@v5
        with:
          context: ./mysql8-build-lnx9
          file: ./mysql8-build-lnx9/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY_NAME }}/mysql8-build-lnx9:${{ github.ref_name }}
  